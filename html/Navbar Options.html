<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Category - Bootstrap 5 Options</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .navbar-example {
      margin-bottom: 1rem;
    }
    .color-option {
      padding: 5px;
      border: 1px solid #ccc;
      display: inline-block;
      margin-right: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Navbar Options</h1>
    
    <!-- Navbar Option 1 -->
    <div class="navbar-example">
      <nav class="navbar navbar-light" style="background-color: #f8f9fa;">
        <a class="navbar-brand" href="#">Light Navbar</a>
      </nav>
      <label>Select Background Color:</label>
      <div class="color-option" style="background-color: #f8f9fa;" onclick="changeNavbarColor('#f8f9fa')">Light</div>
      <div class="color-option" style="background-color: #343a40; color: #fff;" onclick="changeNavbarColor('#343a40')">Dark</div>
    </div>

    <!-- Navbar Option 2 -->
    <div class="navbar-example">
      <nav class="navbar navbar-dark bg-dark">
        <a class="navbar-brand" href="#">Dark Navbar</a>
      </nav>
      <label>Select Background Color:</label>
      <div class="color-option" style="background-color: #343a40; color: #fff;" onclick="changeNavbarColor('#343a40')">Dark</div>
      <div class="color-option" style="background-color: #007bff; color: #fff;" onclick="changeNavbarColor('#007bff')">Primary</div>
    </div>

    <!-- Add more navbar examples with different styles -->
  </div>

  <script>
    function changeNavbarColor(color) {
      document.querySelectorAll('.navbar-example nav').forEach(nav => {
        nav.style.backgroundColor = color;
      });
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
